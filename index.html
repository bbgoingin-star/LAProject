<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineare Algebra - VekShot V6</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

    <style>
        /* --- DYNAMISCHE CSS VARIABLEN --- */
        :root {
            --bg-color: #2c3e50;
            --ui-color: #34495e;
            --accent-color: #e74c3c;
            --text-color: #ffffff;
        }

        body { 
            font-family: Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 10px 20px;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: background-color 0.4s ease, color 0.4s ease;
            box-sizing: border-box; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        .header-container { text-align: center; margin-bottom: 10px; flex-shrink: 0; }
        .sub-title { font-size: 14px; color: rgba(255, 255, 255, 0.5); letter-spacing: 3px; margin-bottom: -5px; text-transform: uppercase; font-weight: bold; }
        .main-title { font-size: 42px; font-family: "Pixelify Sans", sans-serif; font-weight: 700; color: white; text-shadow: 4px 4px 0px rgba(0,0,0,0.5); margin: 0; letter-spacing: 2px; }

        /* --- LAYOUT: 3 Spalten --- */
        .app-container { 
            display: flex; 
            gap: 20px; 
            align-items: flex-start;
            justify-content: center; 
            width: 100%; 
            max-width: 1400px; 
            flex: 1;
            margin-bottom: 10px;
        }

        .sidebar-left, .sidebar-right { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 180px; 
            flex-shrink: 0; 
        }

        .center-column { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex: 1;
            min-width: 600px;
        }

        /* --- BUTTONS --- */
        button { font-size: 13px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: all 0.2s; color: white; box-sizing: border-box; }
        
        .main-mode-btn {
            background-color: var(--ui-color);
            width: 100%; min-height: 60px; 
            padding: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; line-height: 1.2; border-left: 6px solid transparent;
        }
        .main-mode-btn small { font-size: 10px; margin-top: 4px; opacity: 0.8; font-weight: normal; }
        .main-mode-btn.active { background-color: var(--accent-color); border-left-color: white; transform: translateX(5px); }

        .sub-mode-btn { background-color: var(--ui-color); padding: 15px 10px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border-left: 6px solid transparent; }
        .sub-mode-btn.active { background-color: var(--accent-color); border-left-color: white; }

        /* --- CANVAS & CONTROLS --- */
        .canvas-container { 
            position: relative; 
            width: 100%;
            background-color: #ecf0f1;
            border: 3px solid var(--ui-color); 
            border-radius: 5px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            overflow: hidden;
            aspect-ratio: 900 / 550; /* Verhindert das Quetschen */
        }

        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
        }

        #timelineContainer {
            position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.85); padding: 15px;
            display: flex; align-items: center; gap: 15px; z-index: 10;
        }
        #timeSlider { flex-grow: 1; cursor: pointer; height: 8px; accent-color: #e74c3c;}

        .bottom-controls { 
            background-color: var(--ui-color); 
            padding: 15px 25px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex-shrink: 0; 
        }

        .input-group { display: flex; gap: 10px; align-items: center; }
        input[type="number"] { width: 60px; padding: 8px; font-size: 16px; font-weight: bold; border: 2px solid var(--accent-color); background-color: rgba(255,255,255,0.1); color: var(--text-color); border-radius: 4px; text-align: center; }
        
        .action-btn { background-color: var(--accent-color); padding: 12px 30px; font-size: 20px; font-weight: 900; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .action-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* --- HIGHSCORE & MATHE PANEL --- */
        .highscore-panel, #mathPanel { 
            background-color: var(--ui-color); 
            padding: 12px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            width: 100%; 
        }
        #mathPanel { background-color: rgba(255, 255, 255, 0.95); color: #2c3e50; display: none; flex-direction: column; font-family: monospace; }
        
        .hs-section { margin-bottom: 8px; background: rgba(0,0,0,0.15); padding: 8px; border-radius: 4px; }
        .hs-entry { font-size: 11px; display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 2px;}

        #status { font-size: 18px; font-weight: bold; text-align: center; margin-top: 5px; min-height: 24px;}
        .hidden { display: none !important; }
        .disabled-ui { opacity: 0.4; pointer-events: none; }
        
        .trademark-footer { position: fixed; bottom: 5px; right: 10px; color: rgba(255,255,255,0.05); font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="sub-title">Lernsoftware</div>
        <h1 class="main-title">VEKSHOT V6</h1>
    </div>

    <div class="app-container" id="mainApp">
        <div class="sidebar-left">
            <button class="main-mode-btn active" onclick="setMainMode('vektor')">
                VEKTOR-SHOOTER
                <small>Grundlagen & Addition</small>
            </button>
            <button class="main-mode-btn" onclick="setMainMode('skalar')">
                SKALAR-TRANSFORM
                <small>Multiplikation & Skalierung</small>
            </button>
            <button class="main-mode-btn" onclick="setMainMode('mathe')">
                MATHE-CHALLENGE
                <small>Wurzeln & Potenzen</small>
            </button>
        </div>

        <div class="center-column">
            <div class="canvas-container" id="bb_canvas_box">
                <canvas id="bb_gameCanvas"></canvas>
                
                <div id="timelineContainer" class="hidden">
                    <span style="font-size:12px; font-weight:bold; min-width:40px;">ZEIT:</span>
                    <input type="range" id="timeSlider" min="0" max="100" value="0">
                    <button id="closeTimeline" style="background:#444; padding:5px 10px;">X</button>
                </div>
            </div>

            <div id="status">Bereit zum Start!</div>

            <div class="bottom-controls" id="controlPanel">
                <div class="input-group" id="inputVektor">
                    <div>
                        <label style="display:block; font-size:10px; opacity:0.7;">X-WERT</label>
                        <input type="number" id="targetX" value="3" step="1">
                    </div>
                    <div>
                        <label style="display:block; font-size:10px; opacity:0.7;">Y-WERT</label>
                        <input type="number" id="targetY" value="2" step="1">
                    </div>
                </div>

                <div class="input-group hidden" id="inputSkalar">
                    <div>
                        <label style="display:block; font-size:10px; opacity:0.7;">FAKTOR (s)</label>
                        <input type="number" id="skalarFactor" value="2" step="0.5">
                    </div>
                </div>

                <div class="input-group hidden" id="inputMathe">
                    <div>
                        <label style="display:block; font-size:10px; opacity:0.7;">ERGEBNIS</label>
                        <input type="number" id="mathAnswer" placeholder="?">
                    </div>
                </div>

                <button class="action-btn" id="fireBtn" onclick="fire()">FEUERN!</button>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="highscore-panel">
                <div style="text-align:center; border-bottom:1px solid rgba(255,255,255,0.2); margin-bottom:10px; padding-bottom:5px; font-size:14px;">BESTLEISTUNGEN</div>
                <div class="hs-section">
                    <div style="font-size:9px; color:var(--accent-color); margin-bottom:3px;">VEKTOR-SHOOTER</div>
                    <div class="hs-entry"><span>LEVEL:</span> <span id="hs-vektor-lvl">1</span></div>
                    <div class="hs-entry"><span>TREFFER:</span> <span id="hs-vektor-hits">0</span></div>
                </div>
                <div class="hs-section">
                    <div style="font-size:9px; color:var(--accent-color); margin-bottom:3px;">SKALAR-TRANSF.</div>
                    <div class="hs-entry"><span>LEVEL:</span> <span id="hs-skalar-lvl">1</span></div>
                    <div class="hs-entry"><span>TREFFER:</span> <span id="hs-skalar-hits">0</span></div>
                </div>
            </div>

            <div id="mathPanel">
                <div style="font-weight:bold; margin-bottom:10px; text-align:center; color:#e74c3c;">AUFGABE</div>
                <div id="mathTask" style="font-size:20px; text-align:center; margin-bottom:10px;"></div>
                <div style="font-size:10px; color:#7f8c8d; text-align:center;">Tipp: Berechne den Wert im Kopf oder auf Papier!</div>
            </div>

            <button class="sub-mode-btn" style="margin-top:auto;" onclick="resetGame()">SPIEL NEUSTARTEN</button>
        </div>
    </div>

    <div class="trademark-footer">BJOERN BACH SYSTEMS © 2024</div>

    <script>
        // Dein gesamter Script-Teil ab hier...
        // [Hier den restlichen JavaScript-Code einfügen, den du bereits hattest]
    </script>
</body>
</html>
